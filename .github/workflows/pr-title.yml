name: PR Title

# Enforce Conventional Commit style on PR titles (feat:, fix:, ci: …).
# Squash-merges use the PR title as the commit message, so this keeps the
# main history consistent and machine-readable (useful for release notes).
on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened]

concurrency:
  group: pr-title-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  pull-requests: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          requireScope: false
