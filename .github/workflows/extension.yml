name: Extension

# Extension-specific checks that go beyond a plain build:
#   - version stays in sync between package.json and manifest.json,
#   - the built bundle stays within its size budget,
#   - the Firefox package passes Mozilla's addons-linter (0 errors required).
on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: extension-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Version consistency
        run: npm run check:version
      - name: Build (Chrome + Firefox)
        run: npm run build:firefox
      - name: Bundle size budget
        run: npm run check:size
      - name: addons-linter (Firefox package)
        run: npm run lint:ext
