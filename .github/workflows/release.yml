name: Release

# On a version tag (e.g. v0.1.0), build both browser packages, zip them and
# attach them to a GitHub Release so each version is downloadable/installable
# without a local build. Release notes are generated from the merged PRs.
on:
  push:
    tags: ["v*"]

# Don't cancel a release that's already publishing.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write # create the release and upload assets

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Check tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} does not match package.json version ${PKG}"
            exit 1
          fi
      - name: Build + package (Chrome + Firefox zips)
        run: npm run package
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            focus-roast-chrome-*.zip \
            focus-roast-firefox-*.zip \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
