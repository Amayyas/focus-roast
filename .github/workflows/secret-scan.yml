name: Secret Scan

# Scans the repository (full history on push/schedule, the diff on PRs) for
# leaked secrets — API keys, tokens, etc. Focus Roast stores the user's API key
# only in chrome.storage.local, so nothing sensitive should ever be committed;
# this guards that invariant.
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 4 * * 1" # weekly, Monday 04:00 UTC

concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0 # full history so gitleaks can scan every commit
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
